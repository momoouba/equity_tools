# 上游服务器配置（访问宿主机上的应用）
upstream app_backend {
    server 172.18.0.1:3001;  # Docker 实际网关 IP，用于访问宿主机
    # 备用：如果 172.18.0.1 不可用，可以尝试 172.17.0.1:3001 或 host.docker.internal:3001
}

server {
    listen 80;
    server_name news.gf-dsai.com _;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 客户端最大请求体大小
    client_max_body_size 20M;

    # 健康检查（优先级最高）
    location /health {
        proxy_pass http://app_backend/api/health;
        access_log off;
    }

    # API 上传文件代理（优先级第二，必须在 /api 之前，确保 /api/uploads 请求被正确代理）
    location ^~ /api/uploads/ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_buffering off;
        access_log off;
    }

    # API 代理（优先级第三）
    location /api {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_buffering off;
    }

    # 静态资源（assets 目录，优先级第四）
    location ^~ /assets/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # 静态资源缓存（其他静态文件，优先级第五）
    # 注意：只匹配前端静态文件，不匹配 /api 路径下的文件
    location ~* ^/assets/.*\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # 前端静态文件（最后匹配，优先级最低）
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        index index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

