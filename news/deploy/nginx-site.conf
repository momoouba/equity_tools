# 上游服务器配置（使用Docker容器名，在同一网络中）
upstream app_backend {
    server app:3001;  # 使用容器名，Docker会自动解析到正确的IP
    # 备用：如果容器名不可用，可以尝试 172.18.0.1:3001（Docker网关IP）
    keepalive 32;
}

# HTTP服务器 - 重定向到HTTPS
server {
    listen 80;
    server_name news.gf-dsai.com _;

    # Let's Encrypt验证（如果需要）
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 重定向到HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS服务器
server {
    listen 443 ssl http2;
    server_name news.gf-dsai.com _;

    # SSL证书配置（1Panel证书路径）
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 字符编码设置（确保中文正确显示）
    charset utf-8;
    source_charset utf-8;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 客户端最大请求体大小
    client_max_body_size 20M;

    # 健康检查（优先级最高）
    location /health {
        proxy_pass http://app_backend/api/health;
        proxy_connect_timeout 10s;
        proxy_read_timeout 10s;
        access_log off;
    }

    # API 上传文件代理（优先级第二，必须在 /api 之前，确保 /api/uploads 请求被正确代理）
    location ^~ /api/uploads/ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # 增加超时时间，防止应用启动期间的请求失败
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        access_log off;
    }

    # API 代理（优先级第三）
    location /api {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # 增加超时时间，防止应用启动期间的请求失败
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 300s;
        proxy_buffering off;
        # 增加重试机制
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;
    }

    # 静态资源（assets 目录，优先级第四）
    # 注意：CSS和JS文件使用短期缓存，其他静态文件使用长期缓存
    # 使用独立的顶级location块，正则匹配优先于普通前缀匹配
    
    # CSS和JS文件使用1小时缓存，便于更新（正则匹配，会优先于普通前缀匹配）
    location ~* ^/assets/.*\.(css|js)$ {
        root /usr/share/nginx/html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
        try_files $uri =404;
    }
    
    # 其他静态文件使用30天缓存（普通前缀匹配，不会阻止正则匹配）
    location /assets/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # 明确禁止缓存 index.html，确保部署后浏览器拉取最新 HTML 和新版 JS
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 前端静态文件（最后匹配，优先级最低）
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        index index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "text/html; charset=utf-8";
    }
}

# ==========================================
# AI工具推荐网站 - aileading.gf-dsai.com
# ==========================================

# HTTP服务器 - 重定向到HTTPS
server {
    listen 80;
    server_name aileading.gf-dsai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS服务器
server {
    listen 443 ssl http2;
    server_name aileading.gf-dsai.com;

    # SSL证书配置
    ssl_certificate /etc/nginx/ssl/aileading-fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/aileading-privkey.pem;

    # SSL安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    charset utf-8;
    source_charset utf-8;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 10M;

    # 静态文件服务
    root /opt/leadingpage;
    index AI工具推荐网站.html index.html;

    location / {
        try_files $uri $uri/ /AI工具推荐网站.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "text/html; charset=utf-8";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "text/html; charset=utf-8";
    }

    access_log /var/log/nginx/aileading_access.log;
    error_log /var/log/nginx/aileading_error.log;
}

