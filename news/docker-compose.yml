services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: newsapp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-RootPassword123!}
      MYSQL_DATABASE: ${DB_NAME:-investment_tools}
      MYSQL_USER: ${DB_USER:-newsapp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-NewsApp@2024}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql-init:/docker-entrypoint-initdb.d
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - newsapp-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newsapp
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-newsapp}
      DB_PASSWORD: ${DB_PASSWORD:-NewsApp@2024}
      DB_NAME: ${DB_NAME:-investment_tools}
      TZ: Asia/Shanghai
    ports:
      - "${APP_PORT:-3001}:3001"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      # 注释掉 .env 文件挂载，使用 docker-compose.yml 的环境变量
      # - ./.env:/app/.env:ro
      - ./server:/app/server
      - app_frontend:/app/client/dist
    networks:
      - newsapp-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/api/health', (r) => {let data='';r.on('data',d=>data+=d);r.on('end',()=>{process.exit(r.statusCode===200?0:1)});r.on('error',e=>{console.error(e);process.exit(1)})})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s  # 增加到120秒，确保应用完全初始化（数据库初始化、定时任务等）

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: newsapp-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx-site.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - ./deploy/ssl/aileading-fullchain.pem:/etc/nginx/ssl/aileading-fullchain.pem:ro
      - ./deploy/ssl/aileading-privkey.pem:/etc/nginx/ssl/aileading-privkey.pem:ro
      - app_frontend:/usr/share/nginx/html:ro
      - /opt/leadingpage:/opt/leadingpage:ro
    networks:
      - newsapp-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mysql_data:
    driver: local
  app_frontend:
    driver: local

networks:
  newsapp-network:
    driver: bridge

