# Nginx配置文件 - AI工具推荐网站
# 域名: aileading.gf-dsai.com
# 静态文件路径: /opt/leadingpage

# HTTP服务器 - 重定向到HTTPS
server {
    listen 80;
    server_name aileading.gf-dsai.com;

    # Let's Encrypt验证（如果需要）
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 重定向到HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS服务器
server {
    listen 443 ssl http2;
    server_name aileading.gf-dsai.com;

    # SSL证书配置
    # 证书位置: /opt/newsapp/news/deploy/ssl/
    ssl_certificate /opt/newsapp/news/deploy/ssl/aileading-fullchain.pem;
    ssl_certificate_key /opt/newsapp/news/deploy/ssl/aileading-privkey.pem;

    # SSL安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 字符编码设置（确保中文正确显示）
    charset utf-8;
    source_charset utf-8;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 客户端最大请求体大小
    client_max_body_size 10M;

    # 静态文件服务
    root /opt/leadingpage;
    index AI工具推荐网站.html index.html;

    # 主页面 - 支持中文文件名
    location / {
        # 优先尝试直接访问根路径的文件
        try_files $uri $uri/ /AI工具推荐网站.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "text/html; charset=utf-8";
    }

    # 如果直接访问根路径，返回HTML文件（URL编码处理）
    location = / {
        # 使用rewrite重定向到HTML文件（避免中文URL编码问题）
        rewrite ^ /AI工具推荐网站.html permanent;
    }

    # 静态资源缓存（如果有其他资源文件）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML文件不缓存
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "text/html; charset=utf-8";
    }

    # 日志配置
    access_log /var/log/nginx/aileading_access.log;
    error_log /var/log/nginx/aileading_error.log;
}

